<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Theater</title>
    <style>
        /* This removes all margins and makes the video fill the entire screen */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: black; 
            overflow: hidden; 
        }
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&controls=0" 
        allow="autoplay; encrypted-media; fullscreen" 
        allowfullscreen>
    </iframe>

</body>
</html>
